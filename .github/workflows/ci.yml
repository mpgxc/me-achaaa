name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - homolog

jobs:
  quality:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      # Skip lifecycle scripts: the test/lint/typecheck gate does not need the
      # Serverless Framework binary (its postinstall fetches an external release).
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Typecheck
        run: npx tsc --build tsconfig.json
      - name: Lint
        run: npx biome check
      - name: Test
        run: npx vitest run
